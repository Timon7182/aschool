<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 84" role="img" aria-label="A School — образовательный центр">
  <title>A School</title>
  <defs>
    <linearGradient id="asLav" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B8A8F0"/>
      <stop offset="1" stop-color="#8B6FE0"/>
    </linearGradient>
    <linearGradient id="asGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34A87A"/>
      <stop offset="1" stop-color="#1F8A5B"/>
    </linearGradient>
  </defs>
  <!-- Знак: буква «A» из двух пересекающихся мазков + зелёный элемент между ног -->
  <g transform="translate(6 6)">
    <!-- зелёный треугольник между ног -->
    <path d="M36 44 L50 74 L22 74 Z" fill="url(#asGreen)"/>
    <!-- правый мазок — тёмно-фиолетовый -->
    <path d="M36 8 L64 74" fill="none" stroke="#4C2A85" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- левый мазок — лавандово-фиолетовый градиент (поверх, светлый) -->
    <path d="M36 8 L8 74" fill="none" stroke="url(#asLav)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- блик на левом мазке -->
    <path d="M34 16 L20 52" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Текст «A SCHOOL» -->
  <text x="92" y="54" font-family="Nunito, 'Segoe UI', Arial, sans-serif" font-weight="900" font-size="34" letter-spacing="0.5" fill="#241E38">A SCHOOL</text>
</svg>
