<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Страница не найдена | A School</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/png" href="assets/img/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,0" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FDFCFF;
      --text:      #241E38;
      --secondary: #6B6580;
      --purple:    #6C4BC7;
      --purple-dk: #4C2A85;
      --green:     #1F8A5B;
      --card-bg:   #fff;
      --card-border: rgba(108,75,199,0.10);
    }

    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #F3EFFC 0%, #FDFCFF 50%, #E9F6F0 100%);
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      top: -120px; left: -120px;
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(163,140,240,0.18), transparent 70%);
    }
    .blob-2 {
      bottom: -160px; right: -100px;
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(52,168,122,0.14), transparent 70%);
    }

    .card-404 {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.80);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      box-shadow: 0 24px 64px rgba(76,42,133,0.12);
      padding: clamp(32px, 6vw, 56px) clamp(28px, 6vw, 64px);
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 22px;
      color: var(--purple-dk);
      margin-bottom: 32px;
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(108,75,199,0.12), rgba(31,138,91,0.10));
      display: grid;
      place-items: center;
      margin: 0 auto 20px;
      font-size: 40px;
      color: var(--purple);
    }

    .num-404 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(64px, 16vw, 96px);
      line-height: 1;
      background: linear-gradient(120deg, var(--purple-dk) 0%, var(--purple) 50%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .title-404 {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: clamp(20px, 4vw, 26px);
      color: var(--text);
      margin-bottom: 8px;
    }

    .kz-title {
      font-size: clamp(15px, 3vw, 18px);
      font-weight: 700;
      color: var(--secondary);
      margin-bottom: 20px;
    }

    .desc {
      font-size: 15px;
      color: var(--secondary);
      line-height: 1.65;
      margin-bottom: 32px;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Manrope', sans-serif;
      font-weight: 800;
      font-size: 15px;
      text-decoration: none;
      padding: 14px 26px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-purple {
      background: linear-gradient(120deg, var(--purple-dk), var(--purple));
      color: #fff;
      box-shadow: 0 10px 26px rgba(76,42,133,0.28);
    }
    .btn-purple:hover {
      box-shadow: 0 14px 32px rgba(76,42,133,0.36);
    }

    .btn-ghost {
      background: rgba(108,75,199,0.08);
      color: var(--purple-dk);
      border: 1.5px solid rgba(108,75,199,0.18);
    }
    .btn-ghost:hover {
      background: rgba(108,75,199,0.14);
    }

    .ms {
      font-family: 'Material Symbols Rounded';
      font-weight: 400;
      font-style: normal;
      font-size: inherit;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-feature-settings: 'liga';
      font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      vertical-align: middle;
      font-variation-settings: 'FILL' 1;
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 28px;
      font-size: 13px;
      color: var(--secondary);
      text-align: center;
    }
    footer a {
      color: var(--purple);
      text-decoration: none;
      font-weight: 700;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="blob blob-1" aria-hidden="true"></div>
  <div class="blob blob-2" aria-hidden="true"></div>

  <main>
    <div class="card-404">

      <a class="logo-link" href="index.html" aria-label="A School — на главную">
        <img src="assets/img/logo-mark.png" alt="A School" style="height:44px;width:auto;">
        <span>A SCHOOL</span>
      </a>

      <div class="icon-wrap" aria-hidden="true">
        <span class="ms" style="font-size: 40px;">search_off</span>
      </div>

      <div class="num-404" aria-label="404">404</div>

      <h1 class="title-404">Страница не найдена</h1>
      <p class="kz-title">Бет табылмады</p>

      <p class="desc">
        Возможно, страница была перемещена или адрес введён с ошибкой.
        Вернитесь на главную и найдите всё, что вам нужно.
      </p>

      <div class="btn-row">
        <a class="btn btn-purple" href="index.html">
          <span class="ms" style="font-size: 20px;">home</span>
          Главная (RU)
        </a>
        <a class="btn btn-ghost" href="kz/index.html">
          <span class="ms" style="font-size: 20px;">home</span>
          Басты бет (ҚАЗ)
        </a>
      </div>

    </div>
  </main>

  <footer>
    <p>
      &copy; 2026 <a href="index.html">A School</a> &mdash; Образовательный центр в Астане &nbsp;|&nbsp;
      <a href="kz/index.html" hreflang="kk">Қазақша</a>
    </p>
  </footer>

</body>
</html>
